name: Build and Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y perl linux-headers-$(uname -r)

      - name: Download checkpatch.pl
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/torvalds/linux/master/scripts/checkpatch.pl \
            -o checkpatch.pl
          curl -fsSL \
            https://raw.githubusercontent.com/torvalds/linux/master/scripts/spelling.txt \
            -o spelling.txt
          curl -fsSL \
            https://raw.githubusercontent.com/torvalds/linux/master/scripts/const_structs.checkpatch \
            -o const_structs.checkpatch
          chmod +x checkpatch.pl

      - name: Fix style (checkpatch.pl --fix-inplace)
        run: |
          find ./src -name '*.c' -o -name '*.h' \
            | xargs -I{} ./checkpatch.pl --no-tree --fix-inplace -f {} || true

      - name: Commit fixes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git diff --quiet || git commit -am "CI: auto-fix codestyle"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Lint (checkpatch.pl)
        run: |
          find ./src -name '*.c' -o -name '*.h' \
            | xargs -I{} ./checkpatch.pl --no-tree --show-types -f {} || true

      - name: Build kernel module
        run: |
          make -C src
